<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumno | Atributos de Egreso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../assets/css/normalize.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <style>
        /* Likert option hover */
        .likert-opt:hover {
            border-color: #a0aec0 !important;
            background: #f7fafc !important;
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img src="../assets/img/logo_lince.png" alt="ITC">
            <div class="sidebar-brand-text">
                <span>Atributos de Egreso</span>
                <span>Portal del Alumno</span>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-label">Panel</div>
            <ul class="sidebar-nav">
                <li>
                    <a href="#" data-view="inicio" class="nav-link">
                        <i class="fa-solid fa-chart-line"></i>
                        Inicio / Resumen
                    </a>
                </li>
                <li>
                    <a href="#" data-view="evaluar" class="nav-link">
                        <i class="fa-solid fa-pen-to-square"></i>
                        Evaluar
                    </a>
                </li>
                <li>
                    <a href="#" data-view="historial" class="nav-link">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        Historial
                    </a>
                </li>
            </ul>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-user-avatar" id="user-avatar">A</div>
                <div class="sidebar-user-info">
                    <span id="user-nombre">—</span>
                    <span id="user-matricula">—</span>
                </div>
            </div>
            <button class="btn-logout-sidebar" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                Cerrar sesión
            </button>
        </div>
    </aside>

    <div class="main-area">
        <header class="topbar">
            <h1 class="topbar-title" id="topbar-title">Portal del Alumno</h1>
            <span class="topbar-subtitle" id="topbar-subtitle"></span>
        </header>
        <main class="content-area" id="content-area">
            <div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> Cargando...</div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/alumno/dashboard-alumno.js"></script>
    <script src="../assets/js/alumno/inicio.js"></script>
    <script src="../assets/js/alumno/evaluar.js"></script>
    <script src="../assets/js/alumno/historial.js"></script>
    <script>cargarVistaAlumno('inicio');</script>
</body>
</html>
