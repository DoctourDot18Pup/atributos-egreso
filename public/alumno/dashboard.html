<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Atributos de Egreso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/normalize.css">
    <style>
        :root {
            --verde-itc: #1a6b35;
            --font: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: #f0f2f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(26,107,53,0.10);
        }

        .badge {
            display: inline-block;
            background: var(--verde-itc);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.3rem;
            color: #1a202c;
            margin-bottom: 8px;
        }

        p {
            font-size: 0.88rem;
            color: #718096;
            margin-bottom: 24px;
        }

        .info {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            text-align: left;
            font-size: 0.82rem;
            color: #4a5568;
            margin-bottom: 24px;
            line-height: 1.8;
        }

        .info span {
            font-weight: 600;
            color: var(--verde-itc);
        }

        .btn-logout {
            background: #e53e3e;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px 28px;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-logout:hover {
            background: #c53030;
        }

        .placeholder-note {
            font-size: 0.78rem;
            color: #a0aec0;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="badge" class="badge">cargando...</div>
        <h1 id="bienvenida">Bienvenido</h1>
        <p>Sesión iniciada correctamente</p>

        <div class="info">
            <div>Usuario: <span id="info-email">—</span></div>
            <div>Rol: <span id="info-rol">—</span></div>
            <div id="info-extra"></div>
        </div>

        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
        <p class="placeholder-note">Dashboard en construcción — Fase 4</p>
    </div>

    <script src="../assets/js/utils.js"></script>
    <script>
        // Proteger ruta — detectar rol desde URL
        const path = window.location.pathname;
        let rolRequerido = null;
        if (path.includes('/admin/'))       rolRequerido = 'admin';
        if (path.includes('/coordinador/')) rolRequerido = 'coordinador';
        if (path.includes('/alumno/'))      rolRequerido = 'alumno';

        const usuario = requireAuth(rolRequerido);

        // Poblar UI con datos de la sesión
        if (usuario) {
            document.getElementById('badge').textContent       = usuario.rol.toUpperCase();
            document.getElementById('info-email').textContent  = usuario.email;
            document.getElementById('info-rol').textContent    = usuario.rol;

            let extra = '';
            if (usuario.nombre) {
                document.getElementById('bienvenida').textContent =
                    `Bienvenido, ${usuario.nombre} ${usuario.apellido_paterno || ''}`.trim();
                extra += `Matrícula: <span>${usuario.matricula || '—'}</span><br>`;
                extra += `Carrera: <span>${usuario.nombre_carrera || '—'}</span>`;
            }
            if (usuario.id_carrera && usuario.rol === 'coordinador') {
                extra += `Carrera asignada: <span>${usuario.id_carrera}</span>`;
            }
            document.getElementById('info-extra').innerHTML = extra;
        }

        async function logout() {
            try {
                await apiFetch('/auth/logout.php', { method: 'POST' });
            } catch (_) {
                // Si falla el endpoint igual limpiamos local
            } finally {
                Auth.clear();
                window.location.href = '/atributos-egreso/public/index.html';
            }
        }
    </script>
</body>
</html>
