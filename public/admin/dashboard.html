<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración | Atributos de Egreso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../assets/css/normalize.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-brand">
            <img src="../assets/img/logo_lince.png" alt="ITC">
            <div class="sidebar-brand-text">
                <span>Atributos de Egreso</span>
                <span>Panel de Administración</span>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-label">Catálogos</div>
            <ul class="sidebar-nav">
                <li>
                    <a href="#" data-view="carreras" class="nav-link">
                        <i class="fa-solid fa-building-columns"></i>
                        Carreras
                    </a>
                </li>
                <li>
                    <a href="#" data-view="periodos" class="nav-link">
                        <i class="fa-solid fa-calendar-days"></i>
                        Períodos
                    </a>
                </li>
                <li>
                    <a href="#" data-view="materias" class="nav-link">
                        <i class="fa-solid fa-book"></i>
                        Materias
                    </a>
                </li>
                <li>
                    <a href="#" data-view="atributos" class="nav-link">
                        <i class="fa-solid fa-list-check"></i>
                        Atributos de Egreso
                    </a>
                </li>
                <li>
                    <a href="#" data-view="criterios" class="nav-link">
                        <i class="fa-solid fa-sliders"></i>
                        Criterios
                    </a>
                </li>
                <li>
                    <a href="#" data-view="materia-ae" class="nav-link">
                        <i class="fa-solid fa-link"></i>
                        Relación Materia-AE
                    </a>
                </li>
            </ul>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-label">Usuarios</div>
            <ul class="sidebar-nav">
                <li>
                    <a href="#" data-view="estudiantes" class="nav-link">
                        <i class="fa-solid fa-users"></i>
                        Estudiantes
                    </a>
                </li>
                <li>
                    <a href="#" data-view="usuarios" class="nav-link">
                        <i class="fa-solid fa-user-gear"></i>
                        Usuarios del sistema
                    </a>
                </li>
            </ul>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-user-avatar" id="user-avatar">A</div>
                <div class="sidebar-user-info">
                    <span id="user-email">—</span>
                    <span id="user-rol">—</span>
                </div>
            </div>
            <button class="btn-logout-sidebar" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                Cerrar sesión
            </button>
        </div>

    </aside>

    <!-- ===================== ÁREA PRINCIPAL ===================== -->
    <div class="main-area">

        <header class="topbar">
            <h1 class="topbar-title" id="topbar-title">Panel de Administración</h1>
            <span class="topbar-subtitle" id="topbar-subtitle"></span>
        </header>

        <main class="content-area" id="content-area">
            <!-- El contenido de cada módulo se carga aquí dinámicamente -->
            <div class="empty-state">
                <i class="fa-solid fa-hand-pointer"></i>
                <p>Selecciona un módulo del menú lateral para comenzar.</p>
            </div>
        </main>

    </div>

    <!-- jQuery + DataTables -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/dashboard.js"></script>

    <!-- Módulos del admin — se cargan todos, se activan según la vista -->
    <script src="../assets/js/admin/carreras.js"></script>
    <script src="../assets/js/admin/periodos.js"></script>
    <script src="../assets/js/admin/materias.js"></script>
    <script src="../assets/js/admin/atributos.js"></script>
    <script src="../assets/js/admin/criterios.js"></script>
    <script src="../assets/js/admin/materia-ae.js"></script>
    <script>cargarVista('carreras');</script>
</body>
</html>
