<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinador | Atributos de Egreso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="../assets/css/normalize.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img src="../assets/img/logo_lince.png" alt="ITC">
            <div class="sidebar-brand-text">
                <span>Atributos de Egreso</span>
                <span>Panel de Coordinador</span>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-label">Panel</div>
            <ul class="sidebar-nav">
                <li>
                    <a href="#" data-view="inicio" class="nav-link">
                        <i class="fa-solid fa-chart-line"></i>
                        Inicio / Resumen
                    </a>
                </li>
                <li>
                    <a href="#" data-view="inscripciones" class="nav-link">
                        <i class="fa-solid fa-list-check"></i>
                        Inscripciones
                    </a>
                </li>
                <li>
                    <a href="#" data-view="evaluaciones" class="nav-link">
                        <i class="fa-solid fa-clipboard-list"></i>
                        Evaluaciones
                    </a>
                </li>
                <li>
                    <a href="#" data-view="materias-coord" class="nav-link">
                        <i class="fa-solid fa-book"></i>
                        Materias
                    </a>
                </li>
                <li>
                    <a href="#" data-view="estudiantes-coord" class="nav-link">
                        <i class="fa-solid fa-users"></i>
                        Estudiantes
                    </a>
                </li>
            </ul>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-user-avatar" id="user-avatar">C</div>
                <div class="sidebar-user-info">
                    <span id="user-email">—</span>
                    <span id="user-carrera">—</span>
                </div>
            </div>
            <button class="btn-logout-sidebar" onclick="abrirModalCambiarPassword()"
                    style="margin-bottom:6px;background:transparent;color:#a0aec0;border:1px solid #2d6a4f33">
                <i class="fa-solid fa-key"></i>
                Cambiar contraseña
            </button>
            <button class="btn-logout-sidebar" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                Cerrar sesión
            </button>
        </div>
    </aside>

    <div class="main-area">
        <header class="topbar">
            <h1 class="topbar-title" id="topbar-title">Panel de Coordinador</h1>
            <span class="topbar-subtitle" id="topbar-subtitle"></span>
        </header>
        <main class="content-area" id="content-area">
            <div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> Cargando...</div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/coordinador/dashboard-coord.js"></script>
    <script src="../assets/js/coordinador/inicio.js"></script>
    <script src="../assets/js/coordinador/inscripciones.js"></script>
    <script src="../assets/js/coordinador/evaluaciones.js"></script>
    <script src="../assets/js/coordinador/materias-coord.js"></script>
    <script src="../assets/js/coordinador/estudiantes-coord.js"></script>
    <script>cargarVistaCoord('inicio');</script>
</body>
</html>
