<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración | Atributos de Egreso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/normalize.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-topbar"></div>
        <div class="auth-card">
            <img src="../assets/img/logo_lince.png" alt="TecNM Celaya" class="auth-logo">
            <h1 class="auth-title">Administración</h1>
            <p class="auth-subtitle">Configuración del sistema</p>

            <form id="form-login" novalidate>
                <div class="form-group">
                    <label for="identificador">Usuario administrador</label>
                    <input id="identificador" class="inp" type="email"
                           placeholder="admin@itcelaya.edu.mx"
                           required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input id="password" class="inp" type="password"
                           placeholder="Contraseña"
                           required autocomplete="current-password">
                </div>
                <button id="btn-login" type="submit" class="btn-login">Entrar</button>
            </form>

            <div id="msg" class="form-msg"></div>

            <div class="auth-links">
                <a href="../index.html">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
